<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rage Russia Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background-color: rgba(0,0,0,0.1); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }
        
        .inventory-wrapper { width: 900px; height: 520px; display: flex; flex-direction: column; gap: 15px; }

        /* Шапка как в БР */
        .header { display: flex; justify-content: space-between; background: rgba(15, 15, 15, 0.95); padding: 15px 25px; border-radius: 8px; font-weight: bold; border-bottom: 2px solid #ff4500; }
        .weight { color: #ff4500; }

        .main-content { display: flex; gap: 15px; height: 100%; }

        /* Левая часть со скином */
        .left-panel { flex: 1; background: rgba(15, 15, 15, 0.85); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .skin-display { width: 100%; height: 80%; display: flex; justify-content: center; align-items: center; }
        .skin-display img { height: 90%; filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.3)); }

        .buttons { display: flex; flex-direction: column; gap: 8px; width: 180px; margin-bottom: 20px; }
        .btn { background: rgba(40, 40, 40, 0.9); border: none; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.2s; border-left: 4px solid transparent; }
        .btn:hover { background: #ff4500; }
        .btn.orange { border-left-color: #ff4500; }
        .btn.red { border-left-color: #ff3333; }

        /* Сетка инвентаря */
        .right-panel { flex: 1.2; background: rgba(15, 15, 15, 0.9); border-radius: 10px; padding: 20px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; }
        .slot { background: rgba(40, 40, 40, 0.5); border-radius: 8px; border: 2px solid transparent; display: flex; justify-content: center; align-items: center; position: relative; transition: 0.3s; }
        .slot:hover { border-color: #ff4500; background: rgba(60, 60, 60, 0.7); }
        .slot img { width: 75%; height: 75%; object-fit: contain; }
        .slot.active { border-color: #ff4500; background: rgba(255, 69, 0, 0.1); }
        .item-count { position: absolute; bottom: 5px; right: 8px; font-size: 12px; color: #bbb; }
    </style>
</head>
<body>

<div class="inventory-wrapper">
    <div class="header">
        <div id="p-name">RUSLAN (16)</div>
        <div id="p-lvl">УРОВЕНЬ: 1</div>
        <div class="weight">📦 ВЕС: <span id="p-weight">12.5</span> / 50 КГ</div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="skin-display">
                <img id="p-skin" src="https://гта-лого.рф/skins/248.png" alt="skin">
            </div>
            <div class="buttons">
                <button class="btn orange">🎒 Использовать</button>
                <button class="btn orange">🔄 Обмен</button>
                <button class="btn red">🗑 Удалить</button>
            </div>
        </div>

        <div class="right-panel" id="grid">
            </div>
    </div>
</div>

<script>
    // Тестовая база данных предметов для проверки визуала
    const itemsData = {
        1: { name: "Золотые часы", img: "https://гта-лого.рф/items/watch.png" }, // Предмет из работы водолаза
        2: { name: "Аптечка", img: "https://гта-лого.рф/items/medkit.png" },
        3: { name: "Канистра", img: "https://гта-лого.рф/items/gas.png" }
    };

    // Симуляция данных от сервера
    const playerInventory = [
        { id: 1, count: 1 }, // Золотые часы
        { id: 2, count: 5 }, // Аптечки
        { id: 3, count: 2 }, // Канистра
        null, null, null, null, null, null, null, null, null, null, null, null, null
    ];

    const grid = document.getElementById('grid');

    function render() {
        grid.innerHTML = '';
        playerInventory.forEach((item, index) => {
            let slot = document.createElement('div');
            slot.className = 'slot';
            
            if(item && itemsData[item.id]) {
                slot.innerHTML = `
                    <img src="${itemsData[item.id].img}">
                    <div class="item-count">${item.count}</div>
                `;
            }

            slot.onclick = () => {
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                slot.classList.add('active');
            };

            grid.appendChild(slot);
        });
    }

    render();
</script>
</body>
</html>
